<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MewX's Homepage (Blog, Projects, and Related sites.)">
    <meta name="author" content="MewX">
    {% include webmastermeta.html %}

    <title>{{ page.title }} - MewX's Homepage</title>

    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@300;400;700;900&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Framework CSS -->
    <link rel="stylesheet" href="{{ site.cdn }}css/framework-v4.css">

    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7333757578973883" crossorigin="anonymous"></script>
</head>
<body>
<style>
    /* Page Header */
    .page-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        min-height: 100vh;
        background: url('{{ site.cdn }}imgs/site/home-title-v3.jpg') center/cover fixed;
        overflow: hidden;
        z-index: 0;
    }

    .page-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(to bottom, transparent 0%, rgba(33, 150, 243, 0.0) 50%, rgba(25, 118, 210, 0.6) 100%);
        z-index: 0;
    }

    .page-header-content {
        position: relative;
        z-index: 1;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem;
        text-align: center;
    }

    /* Content Section */
    .content-section {
        max-width: 1400px;
        margin: 0 auto;
        padding: 12rem 2rem 6rem;
        position: relative;
        z-index: 10;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .content-section {
            padding: 8rem 1.5rem 5rem;
        }
    }

    @media (max-width: 480px) {
        .content-section {
            padding: 7rem 1rem 4rem;
        }
    }
</style>

<body>
    {% include navigation-v4.html %}

    <!-- Page Header -->
    <header class="page-header">
        <div class="page-header-content">
            <!-- Empty header for background only -->
        </div>
    </header>

    <!-- Content Section -->
    <section class="content-section">
        {{ content }}
    </section>

    {% include footer-v4.html %}

    <!-- Main JavaScript (includes mobile menu and navbar scroll) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="{{ site.cdn }}js/v4.js"></script>
</body>
</html>
