<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MewX's Homepage (Blog, Projects, and Related sites.)">
    <meta name="author" content="MewX">
    {% include webmastermeta.html %}

    <title>{{ page.title }} - MewX's Homepage</title>

    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@300;400;700;900&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7333757578973883" crossorigin="anonymous"></script>
</head>
<body>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --primary: #2196F3;
        --primary-dark: #1976D2;
        --primary-light: #64B5F6;
        --accent: #03A9F4;
        --text-dark: #1e293b;
        --text-light: #64748b;
        --bg-light: #f0f9ff;
        --bg-white: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
        --shadow-md: 0 4px 6px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
        --shadow-lg: 0 10px 25px rgba(0,0,0,0.15), 0 5px 10px rgba(0,0,0,0.05);
        --shadow-xl: 0 20px 40px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.1);
    }

    body {
        font-family: 'Lora', 'Georgia', 'Times New Roman', serif;
        color: var(--text-dark);
        overflow-x: hidden;
        background: var(--bg-light);
    }

    /* Navigation */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow-sm);
    }

    .navbar-brand {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        text-decoration: none;
        font-family: 'Merriweather', serif;
    }

    .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
    }

    .nav-link {
        color: var(--text-dark);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        position: relative;
        font-family: 'Inter', sans-serif;
    }

    .nav-link:hover {
        color: var(--accent);
    }

    .mobile-menu-btn {
        display: none;
        background: none;
        border: none;
        color: var(--text-dark);
        font-size: 1.5rem;
        cursor: pointer;
        z-index: 1001;
    }

    /* Mobile Menu */
    .mobile-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 280px;
        height: 100vh;
        background: white;
        box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        z-index: 1000;
        transition: right 0.3s ease;
        padding: 5rem 2rem 2rem;
    }

    .mobile-menu.active {
        right: 0;
    }

    .mobile-menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    .mobile-menu-overlay.active {
        opacity: 1;
        pointer-events: auto;
    }

    .mobile-nav-links {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .mobile-nav-link {
        color: var(--text-dark);
        text-decoration: none;
        font-weight: 500;
        font-size: 1.125rem;
        padding: 1.25rem 0;
        display: block;
        border-bottom: 1px solid #e2e8f0;
        transition: all 0.3s ease;
        position: relative;
        font-family: 'Inter', sans-serif;
    }

    .mobile-nav-link::before {
        content: '';
        position: absolute;
        left: 0;
        bottom: -1px;
        width: 0;
        height: 2px;
        background: var(--primary);
        transition: width 0.3s ease;
    }

    .mobile-nav-link:hover {
        color: var(--primary);
        padding-left: 1rem;
        background: rgba(33, 150, 243, 0.05);
    }

    .mobile-nav-link:hover::before {
        width: 100%;
    }

    .mobile-nav-links li:first-child .mobile-nav-link {
        border-top: 1px solid #e2e8f0;
    }

    /* Page Header */
    .page-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #42a5f5 0%, #2196F3 50%, #1976D2 100%);
        overflow: hidden;
        z-index: 0;
    }

    .page-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('{{ site.cdn }}imgs/site/home-title-v3.jpg') center/cover fixed;
        opacity: 0.15;
        z-index: 0;
    }

    .page-header-content {
        position: relative;
        z-index: 1;
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem;
        text-align: center;
    }

    /* Content Section */
    .content-section {
        max-width: 1400px;
        margin: 0 auto;
        padding: 12rem 2rem 6rem;
        position: relative;
        z-index: 10;
    }

    /* Footer */
    .footer {
        background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 50%, #1d4ed8 100%);
        color: white;
        padding: 4rem 2rem 2.5rem;
        text-align: center;
    }

    .social-links {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        margin-bottom: 2.5rem;
    }

    .social-link {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-decoration: none;
        font-size: 1.375rem;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
    }

    .social-link:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .copy-left {
        display: inline-block;
        transform: scaleX(-1);
    }

    .footer-text {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
        line-height: 1.8;
    }

    .footer-text a {
        color: #93c5fd;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .footer-text a:hover {
        color: white;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .nav-links {
            display: none;
        }

        .mobile-menu-btn {
            display: block;
        }

        .content-section {
            padding: 8rem 1.5rem 5rem;
        }
    }

    @media (max-width: 480px) {
        .navbar {
            padding: 1rem;
        }

        .content-section {
            padding: 7rem 1rem 4rem;
        }
    }
</style>

<body>
    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <ul class="mobile-nav-links">
            <li><a href="{{ site.baseurl }}timeline/" class="mobile-nav-link">Timeline</a></li>
            <li><a href="{{ site.baseurl }}projects/" class="mobile-nav-link">Projects</a></li>
            <li><a href="{{ site.baseurl }}archive/" class="mobile-nav-link">Archive</a></li>
            <li><a href="{{ site.baseurl }}friends/" class="mobile-nav-link">Friends</a></li>
            <li><a href="{{ site.baseurl }}about/" class="mobile-nav-link">About</a></li>
        </ul>
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <a href="{{ site.baseurl }}" class="navbar-brand">MewX</a>
        <ul class="nav-links">
            <li><a href="{{ site.baseurl }}timeline/" class="nav-link">Timeline</a></li>
            <li><a href="{{ site.baseurl }}projects/" class="nav-link">Projects</a></li>
            <li><a href="{{ site.baseurl }}archive/" class="nav-link">Archive</a></li>
            <li><a href="{{ site.baseurl }}friends/" class="nav-link">Friends</a></li>
            <li><a href="{{ site.baseurl }}about/" class="nav-link">About</a></li>
        </ul>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <div class="page-header-content">
            <!-- Empty header for background only -->
        </div>
    </header>

    <!-- Content Section -->
    <section class="content-section">
        {{ content }}
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="social-links">
            <a href="https://github.com/MewX" target="_blank" class="social-link" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://stackoverflow.com/users/4206925/mewx" target="_blank" class="social-link" title="Stack Overflow">
                <i class="fab fa-stack-overflow"></i>
            </a>
            <a href="https://www.facebook.com/YuanzhongXia" target="_blank" class="social-link" title="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://twitter.com/YuanzhongXia" target="_blank" class="social-link" title="Twitter">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="https://www.weibo.com/imewx" target="_blank" class="social-link" title="Sina Weibo">
                <i class="fab fa-weibo"></i>
            </a>
        </div>
        <p class="footer-text">
            Copyleft <span class="copy-left">©</span> MewX (2014-2026) - Proudly powered by
            <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> and
            <a href="http://animejs.com/" target="_blank">anime.js</a>
        </p>
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-7WDGSLHY89"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag('js', new Date());
            gtag('config', 'G-7WDGSLHY89');
        </script>
    </footer>

    <script>
        // Mobile menu toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');

        if (mobileMenuBtn && mobileMenu && mobileMenuOverlay) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.add('active');
                mobileMenuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            });

            mobileMenuOverlay.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
                mobileMenuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            });

            const mobileNavLinks = document.querySelectorAll('.mobile-nav-link');
            mobileNavLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.remove('active');
                    mobileMenuOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                });
            });
        }
    </script>
</body>
</html>
